name: CI Pipeline - Base Staking Protocol

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Run tests
        run: npm test

      # Opcjonalnie: sprawdzenie formatowania (jeśli używasz prettier/solhint)
      # - name: Check code style
      #   run: npx solhint "contracts/**/*.sol" && npx prettier --check .
