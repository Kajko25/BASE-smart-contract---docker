version: '3.8'

services:
  hardhat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: base-staking-hardhat
    volumes:
      - ..:/app
    env_file:
      - ../.env
    ports:
      - "8545:8545"     # Hardhat Network (jeśli chcesz lokalny node)
    command: sh -c "npm run compile && tail -f /dev/null"   # trzyma kontener uruchomiony

